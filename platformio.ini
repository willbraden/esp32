    ${env.build_flags}
    -D DISPLAY_BW_ONLY
    -D DISPLAY_WIDTH=264
    -D DISPLAY_HEIGHT=176
lib_deps =
    ${env.lib_deps}
    zinggjm/GxEPD2@^1.5.3
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*
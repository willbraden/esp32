; PlatformIO Project Configuration File for ESP32 Arduino Slack Reactions Client
; Supports multiple LilyGo T5 e-paper display variants with BW and 4G modes

[platformio]
default_envs = lilygo_t5_depg_bw

; Common settings for all environments
[env]
; Using pioarduino community platform for Arduino Core 3.x support
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.32/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.embed_files = certs/x509_crt_bundle.bin

; Pre-build script to set firmware version from version.txt
extra_scripts = pre:scripts/set_version.py

; The pebl firmware compiles everything EXCEPT the standalone weather app
; (which lives in src/weather/ and has its own setup()/loop()).
build_src_filter = +<*> -<weather/>

; Common library dependencies (excluding display libraries)
lib_deps =
    ; JSON handling
    bblanchon/ArduinoJson@^7.0.4

    ; WebSocket client with SSL support
    links2004/WebSockets@^2.7.0

    ; Additional graphics support
    adafruit/Adafruit GFX Library@^1.11.9

    ; Time management
    paulstoffregen/Time@^1.6.1

    ; PNG decoder for emoji rendering (lightweight, ESP32-optimized)
    bitbank2/PNGdec@^1.0.1

    ; WiFi provisioning with captive portal
    tzapu/WiFiManager@^2.0.17

    ; QR code generation for WiFi provisioning
    ricmoo/QRCode@^0.0.1

; Common build flags
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ENABLE_DEBUG_FEATURES
    ; CONFIG_SPIRAM_SUPPORT is already defined in SDK's sdkconfig.h

; ============================================================================
; BLACK & WHITE (2-Level) Displays
; ============================================================================

; LilyGo T5 V2.3.1 with DEPG0213BN display (2-level BW only)
[env:lilygo_t5_depg_bw]
build_flags =
    ${env.build_flags}
    -D DISPLAY_DEPG0213BN
    -D DISPLAY_BW_ONLY
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
lib_deps =
    ${env.lib_deps}
    zinggjm/GxEPD2@^1.5.3
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*

; LilyGo T5 2.13" with GDEW0213T5D display (2-level BW, UC8151D controller)
[env:lilygo_t5_gdew_bw]
build_flags =
    ${env.build_flags}
    -D DISPLAY_GDEW0213T5D
    -D DISPLAY_BW_ONLY
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
lib_deps =
    ${env.lib_deps}
    zinggjm/GxEPD2@^1.5.3
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*

; ============================================================================
; GRAYSCALE (4-Level) Displays - GDEM0213B74 / GDEY0213B74
; ============================================================================

; LilyGo T5 V2.3.1 with GDEM0213B74 display (4-level grayscale)
[env:lilygo_t5_gdem_4g]
build_flags =
    ${env.build_flags}
    -D DISPLAY_GDEM0213B74
    -D DISPLAY_4G_GRAYSCALE
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
lib_deps =
    ${env.lib_deps}
    https://github.com/ZinggJM/GxEPD2_4G.git
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*

; LilyGo T5 2.13" with GDEW0213T5D display (4-level grayscale test with GDEW0213I5F driver)
[env:lilygo_t5_gdew_4g]
build_flags =
    ${env.build_flags}
    -D DISPLAY_GDEW0213I5F
    -D DISPLAY_4G_GRAYSCALE
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
lib_deps =
    ${env.lib_deps}
    https://github.com/ZinggJM/GxEPD2_4G.git
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*
upload_speed = 460800
upload_flags =
    --before=default_reset
    --after=hard_reset

; LilyGo T5 2.13" with GDEY0213B74 display (4-level grayscale, fast refresh)
[env:lilygo_t5_gdey_4g]
build_flags =
    ${env.build_flags}
    -D DISPLAY_GDEY0213B74
    -D DISPLAY_4G_GRAYSCALE
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
lib_deps =
    ${env.lib_deps}
    https://github.com/ZinggJM/GxEPD2_4G.git
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*

; ============================================================================
; ESP32-S3 ENVIRONMENTS
; ============================================================================

[env:lilygo_t5_s3_depg_bw]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D DISPLAY_DEPG0213BN
    -D DISPLAY_BW_ONLY
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
lib_deps =
    ${env.lib_deps}
    zinggjm/GxEPD2@^1.5.3
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101

[env:lilygo_t5_s3_gdew_4g]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D DISPLAY_GDEW0213I5F
    -D DISPLAY_4G_GRAYSCALE
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
lib_deps =
    ${env.lib_deps}
    https://github.com/ZinggJM/GxEPD2_4G.git
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101

; ============================================================================
; STANDALONE WEATHER DISPLAY (ESP32-S3, custom app — not the pebl firmware)
; ============================================================================

; Self-contained weather station. Compiles ONLY src/weather/ — none of the
; pebl Slack/Discord app. See src/weather/weather_main.cpp.
[env:pebl_weather]
board = esp32-s3-devkitc-1
; This pebl board has a 4MB flash chip (devkitc-1 profile defaults to 8MB,
; which writes a bad flash-size header and aborts at boot).
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
build_src_filter = -<*> +<weather/>
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    ; TLS handshake (mbedTLS) needs more than the default 8KB loop-task stack
    -D ARDUINO_LOOP_STACK_SIZE=16384
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    adafruit/Adafruit GFX Library@^1.11.9
    tzapu/WiFiManager@^2.0.17
    zinggjm/GxEPD2@^1.5.3
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101

; ============================================================================
; LEGACY ENVIRONMENTS (for backward compatibility)
; ============================================================================

; Legacy: LilyGo T5 V2.3.1 (defaults to BW mode)
[env:lilygo_t5_v231]
build_flags =
    ${env.build_flags}
    -D DISPLAY_DEPG0213BN
    -D DISPLAY_BW_ONLY
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
lib_deps =
    ${env.lib_deps}
    zinggjm/GxEPD2@^1.5.3
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*

; Legacy: LilyGo T5 2.13" standard e-paper
[env:lilygo_t5_213]
build_flags =
    ${env.build_flags}
    -D DISPLAY_DEPG0213BN
    -D DISPLAY_BW_ONLY
    -D DISPLAY_WIDTH=212
    -D DISPLAY_HEIGHT=104
lib_deps =
    ${env.lib_deps}
    zinggjm/GxEPD2@^1.5.3
upload_port = /dev/cu.usbserial-*
monitor_port = /dev/cu.usbserial-*

; Legacy: LilyGo T5S 2.7" e-paper
[env:lilygo_t5s_27]
